function load(){
  try{return JSON.parse(localStorage.getItem(KEY))||{done:{},last:0,quiz:{}}}
  catch(e){return{done:{},last:0,quiz:{}}}
}
function save(){localStorage.setItem(KEY,JSON.stringify(progress))}
function $(id){return document.getElementById(id)}
function toast(msg){
  $("toast").textContent=msg;
  $("toast").classList.add("show");
  setTimeout(()=>$("toast").classList.remove("show"),1800);
}
function speak(text,lang="en-US",rate=.82){
  if(!("speechSynthesis" in window)){toast("这个浏览器暂不支持语音");return}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;
  u.rate=rate;
  u.pitch=lang==="zh-CN"?1.05:1;
  const voices=speechSynthesis.getVoices();
  if(voices.length){
    const v=voices.find(x=>x.lang===lang)||voices.find(x=>x.lang&&x.lang.startsWith(lang.slice(0,2)));
    if(v)u.voice=v;
  }
  speechSynthesis.speak(u);
}
function startApp(){
  closeWelcome();
  speak("Hello, Letong.","en-US");
  setTimeout(()=>speak("乐桐，我们开始英语口语练习吧！","zh-CN",1),850);
}
function closeWelcome(){$("welcome").classList.add("hide")}
function good(){
  const arr=[`${NAME}真棒，答对啦！`,`哇，${NAME}太厉害了！`,`${NAME}读得很好，继续加油！`,`小火车出发，${NAME}又得到一颗星！`];
  const msg=arr[Math.floor(Math.random()*arr.length)];
  speak(msg,"zh-CN",1);
  toast(msg);
}
function doneCount(){return Object.values(progress.done).filter(Boolean).length}
function showHome(){
  $("home").classList.remove("hide");
  $("lesson").classList.add("hide");
  $("review").classList.add("hide");
  const done=doneCount(), pct=Math.round(done/60*100);
  $("home").innerHTML=`
  <section class="panel hero">
    <div class="row space">
      <div>
        <div class="badge">🌟 已完成 ${done} / 60 天</div>
        <h2 style="margin:10px 0 5px">暑假每天一练，轻松开口说英语</h2>
        <div class="mini">建议每天8—12分钟。只练听说，不要求默写，不考音标。</div>
      </div>
      <div class="emoji">🚂</div>
    </div>
    <div style="height:12px"></div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="row" style="margin-top:12px">
      <button class="primary" onclick="openToday()">继续今天</button>
      <button class="ghost" onclick="resetAll()">清空进度</button>
    </div>
  </section>
  <section class="panel">
    <div class="sec">📅 60天路线图</div>
    <div class="grid">
    ${LESSONS.map((d,i)=>`
      <div class="day ${progress.done[i]?"done":""}" onclick="openDay(${i})">
        <div class="dayNo">Day ${i+1}</div>
        <div class="dayTitle">${d.t}</div>
        <div class="mini">${d.f}</div>
        <div class="stars">${progress.done[i]?"★★★":"☆ ☆ ☆"}</div>
      </div>`).join("")}
    </div>
  </section>`;
}
function openToday(){openDay(progress.last||0)}
function openDay(i){
  current=i;
  progress.last=i;
  save();
  renderLesson();
}
function renderLesson(){
  const d=LESSONS[current];
  $("home").classList.add("hide");
  $("review").classList.add("hide");
  $("lesson").classList.remove("hide");
  $("lesson").innerHTML=`
  <section class="panel hero">
    <div class="row space">
      <div>
        <div class="badge">Day ${current+1} / 60</div>
        <h2 style="margin:8px 0 4px">${d.t}</h2>
        <div class="mini">${d.f}</div>
      </div>
      <div class="emoji">${progress.done[current]?"🌟":"🎧"}</div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="ghost" onclick="prevDay()">上一天</button>
      <button class="ghost" onclick="nextDay()">下一天</button>
      <button class="primary" onclick="playToday()">一键听今天</button>
    </div>
  </section>

  <section class="panel">
    <div class="sec">1️⃣ 今天3个词</div>
    <div class="words">
      ${d.w.map((w,i)=>`
      <div class="word">
        <div class="emoji">${w[2]}</div>
        <div class="en">${w[0]}</div>
        <div class="zh">${w[1]}</div>
        <div class="row" style="margin-top:9px">
          <button class="teal" onclick="sayWord(${i})">听英文</button>
          <button class="ghost" onclick="speak('${w[1]}','zh-CN',1)">听中文</button>
        </div>
      </div>`).join("")}
    </div>
  </section>

  <section class="panel">
    <div class="sec">2️⃣ 跟读两句话</div>
    ${d.s.map((x,i)=>`
      <div class="sentence">
        <div>
          <div class="senText">${x}</div>
          <div class="mini">先听，再跟读3遍</div>
        </div>
        <button class="teal" onclick="saySentence(${i})">播放</button>
      </div>`).join("")}
  </section>

  <section class="panel">
    <div class="sec">3️⃣ 亲子口语对话</div>
    <div class="dialogue">
    ${d.d.map((x,i)=>`
      <div class="bubble ${x[0]==="家长"?"parent":"child"}">
        <div class="speaker">${x[0]}</div>
        <div style="font-size:18px;font-weight:850">${x[1]}</div>
        <button class="ghost" style="margin-top:7px" onclick="sayLine(${i})">听这句</button>
      </div>`).join("")}
    </div>
    <div class="row" style="margin-top:10px">
      <button class="primary" onclick="playDialogue()">播放整段</button>
    </div>
  </section>

  <section class="panel">
    <div class="sec">4️⃣ 听问题，选答案</div>
    <div class="sentence">
      <div>
        <div class="senText">${d.q[0]}</div>
        <div class="mini">家长可先点播放，再让乐桐选择。</div>
      </div>
      <button class="teal" onclick="speak('${d.q[0]}','zh-CN',1)">播放问题</button>
    </div>
    ${d.q[1].map((c,i)=>`<button id="c${i}" class="choice" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${c}</button>`).join("")}
    <div class="mini">${progress.quiz[current]?"本题已答对 ✅":""}</div>
  </section>

  <section class="panel">
    <div class="sec">👨‍👩‍👧 家长提示</div>
    <p style="line-height:1.7;margin:0">${d.tip}</p>
    <div class="row" style="margin-top:12px">
      <button class="primary" onclick="completeDay()">完成今天，领取星星</button>
      <button class="ghost" onclick="showHome()">返回首页</button>
    </div>
  </section>`;
}
function sayWord(i){speak(LESSONS[current].w[i][0],"en-US")}
function saySentence(i){speak(LESSONS[current].s[i],"en-US")}
function sayLine(i){speak(LESSONS[current].d[i][1],"en-US")}
function playToday(){
  const d=LESSONS[current];
  const text=d.w.map(x=>x[0]).join(". ")+". "+d.s.join(". ");
  speak(text,"en-US");
}
function playDialogue(){speak(LESSONS[current].d.map(x=>x[1]).join(". "),"en-US")}
function answer(i){
  const d=LESSONS[current];
  d.q[1].forEach((_,k)=>$("c"+k).classList.remove("correct","wrong"));
  if(i===d.q[2]){
    $("c"+i).classList.add("correct");
    progress.quiz[current]=true;
    save();
    good();
  }else{
    $("c"+i).classList.add("wrong");
    $("c"+d.q[2]).classList.add("correct");
    speak("没关系，乐桐再试一次，正确答案已经亮出来啦。","zh-CN",1);
  }
}
function completeDay(){
  progress.done[current]=true;
  progress.last=Math.min(current+1,59);
  save();
  good();
  setTimeout(()=>{current<59?openDay(current+1):showHome()},1300);
}
function prevDay(){if(current>0)openDay(current-1)}
function nextDay(){if(current<59)openDay(current+1)}
function resetAll(){
  if(confirm("确定清空所有学习进度吗？")){
    localStorage.removeItem(KEY);
    progress=load();
    showHome();
  }
}
function showReview(){
  $("home").classList.add("hide");
  $("lesson").classList.add("hide");
  $("review").classList.remove("hide");
  const words=[],seen=new Set();
  LESSONS.forEach((d,di)=>d.w.forEach(w=>{
    if(!seen.has(w[0])){seen.add(w[0]);words.push({en:w[0],zh:w[1],emoji:w[2],day:di+1})}
  }));
  $("review").innerHTML=`
  <section class="panel hero">
    <h2>复习池</h2>
    <p class="mini">这里收集60天出现过的口语词。点一下就能听。</p>
  </section>
  <section class="panel">
    <div class="words">
      ${words.map((w,i)=>`
      <div class="word">
        <div class="emoji">${w.emoji}</div>
        <div class="en">${w.en}</div>
        <div class="zh">${w.zh} · Day ${w.day}</div>
        <button class="teal" style="margin-top:8px" onclick="speak('${w.en}','en-US')">听英文</button>
      </div>`).join("")}
    </div>
  </section>`;
}
showHome();
</script>
</body>
</html>
