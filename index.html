    .cn { color:var(--muted); font-size:14px; margin-top:4px; }
    .dialogue { display:grid; gap:8px; }
    .bubble { padding:11px 12px; border-radius:18px; max-width:86%; }

const KEY = "letong_speaking_60_v1";
const NAME = "乐桐";
let currentDay = 1;
let progress = loadProgress();
let soundReady = false;

function loadProgress(){
  try { return JSON.parse(localStorage.getItem(KEY)) || {completed:{}, quiz:{}, read:{}, lastDay:1}; }
  catch(e) { return {completed:{}, quiz:{}, read:{}, lastDay:1}; }
}
function saveProgress(){ localStorage.setItem(KEY, JSON.stringify(progress)); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }
function speak(text, lang='en-US', rate=.82){
  if(!('speechSynthesis' in window)) { toast('这个浏览器暂不支持语音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = rate; u.pitch = lang.startsWith('zh') ? 1.05 : 1;
  const voices = window.speechSynthesis.getVoices();
  if(voices && voices.length) {
    const preferred = voices.find(v => v.lang === lang) || voices.find(v => v.lang && v.lang.startsWith(lang.slice(0,2)));
    if(preferred) u.voice = preferred;
  }
  window.speechSynthesis.speak(u);
}
function encourage(type='good'){
  const lines = [
    `${NAME}真棒，答对啦！`,
    `哇，${NAME}太厉害了！`,
    `${NAME}读得很好，继续加油！`,
    `小火车出发，${NAME}又得到一颗星！`
  ];
  const msg = lines[Math.floor(Math.random()*lines.length)];
  speak(msg,'zh-CN',1); toast(msg);
}
function startApp(){ soundReady=true; speak('Hello, Letong.','en-US'); setTimeout(()=>speak('乐桐，我们开始英语口语练习吧！','zh-CN',1),900); closeWelcome(); }
function closeWelcome(){ document.getElementById('welcome').classList.add('hide'); }
document.getElementById('soundBtn').onclick = startApp;

function doneCount(){ return Object.values(progress.completed).filter(Boolean).length; }
function quizCount(){ return Object.values(progress.quiz).filter(Boolean).length; }
function showHome(){
  document.getElementById('homeView').classList.remove('hide');
  document.getElementById('dayView').classList.add('hide');
  document.getElementById('reviewView').classList.add('hide');
  const done = doneCount();
  const percent = Math.round(done/60*100);
  document.getElementById('homeView').innerHTML = `
    <section class="panel hero">
      <div class="row space">
        <div>
          <div class="badge">🌟 已完成 ${done} / 60 天</div>
          <h2 style="margin:10px 0 6px">暑假每天一练，轻松开口说英语</h2>
          <div class="mini">建议每天 8—12 分钟。只练口语，不要求默写，不考音标。</div>
        </div>
        <div class="bigEmoji">🚂</div>
      </div>
      <div style="height:12px"></div>
      <div class="progressOuter"><div class="progressInner" style="width:${percent}%"></div></div>
      <div class="row" style="margin-top:12px">
        <button class="primary" onclick="openToday()">继续今天</button>
        <button class="ghost" onclick="resetConfirm()">清空进度</button>
      </div>
    </section>
    <section class="panel">
      <div class="sectionTitle">📅 60天路线图</div>
      <div class="grid">
        ${DAYS.map(d=>`<div class="dayCard ${progress.completed[d.day]?'done':''}" onclick="openDay(${d.day})">
          <div class="dayNo">Day ${d.day}</div>
          <div class="dayTitle">${d.title}</div>
          <div class="mini">${d.focus}</div>
          <div class="stars">${progress.completed[d.day]?'★★★':'☆ ☆ ☆'}</div>
        </div>`).join('')}
      </div>
    </section>`;
}
function openToday(){ openDay(progress.lastDay || 1); }
function openDay(n){ currentDay=n; progress.lastDay=n; saveProgress(); renderDay(); }
function renderDay(){
  const d = DAYS[currentDay-1];
  document.getElementById('homeView').classList.add('hide');
  document.getElementById('reviewView').classList.add('hide');
  document.getElementById('dayView').classList.remove('hide');
  const readKey = 'd'+d.day;
  const read = progress.read[readKey] || {words:false,sentences:false,dialogue:false};
  document.getElementById('dayView').innerHTML = `
    <section class="panel hero">
      <div class="row space">
        <div>
          <div class="badge">Day ${d.day} / 60</div>
          <h2 style="margin:8px 0 4px">${d.title}</h2>
          <div class="mini">${d.focus}</div>
        </div>
        <div class="bigEmoji">${progress.completed[d.day]?'🌟':'🎧'}</div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="ghost" onclick="prevDay()">上一天</button>
        <button class="ghost" onclick="nextDay()">下一天</button>
        <button class="primary" onclick="speakDay()">一键听今天</button>
      </div>
    </section>
    <section class="panel">
      <div class="sectionTitle">1️⃣ 今天3个词</div>
      <div class="wordGrid">
        ${d.words.map(w=>`<div class="word"><div class="bigEmoji">${w[2]}</div><div class="en">${w[0]}</div><div class="zh">${w[1]}</div><div class="row" style="margin-top:9px"><button class="teal" onclick="speak('${escapeJS(w[0])}','en-US')">听英文</button><button class="ghost" onclick="speak('${escapeJS(w[1])}','zh-CN',1)">听中文</button></div></div>`).join('')}
      </div>
      <div class="row" style="margin-top:10px"><button class="primary" onclick="markRead('words')">我会读这3个词了</button><span class="mini">${read.words?'已完成 ✅':''}</span></div>
    </section>
    <section class="panel">
      <div class="sectionTitle">2️⃣ 跟读两句话</div>
      ${d.sentences.map((s,i)=>`<div class="sentence"><div><div class="sentenceText">${s}</div><div class="cn">先听，再跟读 3 遍</div></div><button class="teal" onclick="speak('${escapeJS(s)}','en-US')">播放</button></div>`).join('')}
      <div class="row"><button class="primary" onclick="markRead('sentences')">我跟读完成了</button><span class="mini">${read.sentences?'已完成 ✅':''}</span></div>
    </section>
    <section class="panel">
      <div class="sectionTitle">3️⃣ 亲子口语对话</div>
      <div class="dialogue">
        ${d.dialogue.map(line=>`<div class="bubble ${line[0]==='Parent'?'p':'l'}"><div class="speaker">${line[0]==='Parent'?'家长':'乐桐'}</div><div style="font-size:18px;font-weight:850">${line[1]}</div><button class="ghost" style="margin-top:7px" onclick="speak('${escapeJS(line[1])}','en-US')">听这句</button></div>`).join('')}
      </div>
      <div class="row" style="margin-top:10px"><button class="primary" onclick="markRead('dialogue')">我和家长练完了</button><button class="ghost" onclick="playDialogue()">播放整段</button><span class="mini">${read.dialogue?'已完成 ✅':''}</span></div>
    </section>
    <section class="panel">
      <div class="sectionTitle">4️⃣ 听问题，选答案</div>
      <div class="sentence"><div><div class="sentenceText">${d.quiz.ask}</div><div class="cn">家长可先点播放，再让乐桐选择。</div></div><button class="teal" onclick="speak('${escapeJS(d.quiz.ask)}','zh-CN',1)">播放问题</button></div>
      <div class="quizChoices">
        ${d.quiz.choices.map((c,i)=>`<button id="choice-${i}" class="choice" onclick="answerQuiz(${i})">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
      </div>
      <div class="mini" style="margin-top:8px">${progress.quiz[d.day]?'本题已答对 ✅':''}</div>
    </section>
    <section class="panel">
      <div class="sectionTitle">👨‍👩‍👧 家长提示</div>
      <p style="margin:0;line-height:1.7">${d.parent_tip}</p>
      <div class="row" style="margin-top:12px">
        <button class="primary" onclick="completeDay()">完成今天，领取星星</button>
        <button class="ghost" onclick="showHome()">返回首页</button>
      </div>
    </section>`;
}
function escapeJS(s){ return String(s).replace(/\/g,'\\').replace(/'/g,"\'"); }
function prevDay(){ if(currentDay>1) openDay(currentDay-1); }
function nextDay(){ if(currentDay<60) openDay(currentDay+1); }
function markRead(part){
  const key='d'+currentDay;
  progress.read[key]=progress.read[key]||{};
  progress.read[key][part]=true; saveProgress(); encourage(); renderDay();
}
function speakDay(){
  const d=DAYS[currentDay-1];
  let parts=[];
  d.words.forEach(w=>parts.push(w[0]));
  d.sentences.forEach(s=>parts.push(s));
  speak(parts.join('. '),'en-US');
}
function playDialogue(){
  const d=DAYS[currentDay-1];
  speak(d.dialogue.map(x=>x[1]).join('. '),'en-US');
}
function answerQuiz(i){
  const d=DAYS[currentDay-1];
  for(let j=0;j<d.quiz.choices.length;j++) document.getElementById('choice-'+j).classList.remove('correct','wrong');
  if(i===d.quiz.answer){
    document.getElementById('choice-'+i).classList.add('correct');
    progress.quiz[d.day]=true; saveProgress(); encourage();
  } else {
    document.getElementById('choice-'+i).classList.add('wrong');
    document.getElementById('choice-'+d.quiz.answer).classList.add('correct');
    speak('没关系，乐桐再试一次，正确答案已经亮出来啦。','zh-CN',1);
  }
}
function completeDay(){
  const key='d'+currentDay, read=progress.read[key]||{};
  progress.completed[currentDay]=true;
  if(currentDay<60) progress.lastDay=currentDay+1;
  saveProgress(); encourage();
  setTimeout(()=>{ if(currentDay<60) openDay(currentDay+1); else showHome(); }, 1300);
}
function resetConfirm(){
  if(confirm('确定清空所有学习进度吗？')){ localStorage.removeItem(KEY); progress=loadProgress(); showHome(); }
}
function showReview(){
  document.getElementById('homeView').classList.add('hide');
  document.getElementById('dayView').classList.add('hide');
  document.getElementById('reviewView').classList.remove('hide');
  const allWords=[]; DAYS.forEach(d=>d.words.forEach(w=>allWords.push({day:d.day,en:w[0],zh:w[1],emoji:w[2]})));
  const unique=[]; const seen=new Set(); allWords.forEach(w=>{ if(!seen.has(w.en)){ seen.add(w.en); unique.push(w); } });
  document.getElementById('reviewView').innerHTML = `<section class="panel hero"><h2>复习池</h2><p class="mini">这里收集 60 天出现过的口语词。点一下就能听。</p></section><section class="panel"><div class="wordGrid">${unique.map(w=>`<div class="word"><div class="bigEmoji">${w.emoji}</div><div class="en">${w.en}</div><div class="zh">${w.zh} · Day ${w.day}</div><button class="teal" style="margin-top:8px" onclick="speak('${escapeJS(w.en)}','en-US')">听英文</button></div>`).join('')}</div></section>`;
}
showHome();
